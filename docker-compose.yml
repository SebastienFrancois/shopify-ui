services:
  app:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
      - "6006:6006"
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0

  storybook:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "6007:6006"
    environment:
      - NODE_ENV=development
    command: npm run storybook -- --host 0.0.0.0
    profiles:
      - storybook

volumes:
  node_modules:
